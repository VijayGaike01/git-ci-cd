name: Python CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-python-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd projects/python-ci
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd projects/python-ci
          pytest